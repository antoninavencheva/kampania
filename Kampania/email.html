<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>Имейлът е потвърден</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --cream: #FAF7F2;
      --bordo: #6A1B2A;
      --gold: #C9A86A;
      --text-dark: #2B2520;
      --shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--cream);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--text-dark);
    }

    .container {
      max-width: 600px;
      margin: 80px auto;
      background: white;
      padding: 50px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      border-top: 6px solid var(--gold);
      text-align: center;
    }

    h1 {
      color: var(--bordo);
      font-size: 32px;
      margin-bottom: 15px;
    }

    p {
      font-size: 18px;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .icon {
      font-size: 60px;
      color: var(--gold);
      margin-bottom: 20px;
    }

    a.btn {
      display: inline-block;
      margin-top: 25px;
      background: var(--bordo);
      color: white;
      padding: 14px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 18px;
      font-weight: 600;
      transition: 0.3s;
    }

    a.btn:hover {
      background: #4d131f;
    }

    @media (max-width: 600px) {
      .container {
        margin: 30px;
        padding: 30px;
      }
      h1 { font-size: 26px; }
      p { font-size: 16px; }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="icon">✔</div>

    <h1>Имейлът е потвърден!</h1>

    <p>Благодарим ви, че потвърдихте регистрацията си.</p>
    <p>Съвсем скоро ще получите подробна информация за 3‑дневния MathBoost.</p>

    <a href="/" class="btn">Към началната страница</a>
  </div>

</body>
</html>
